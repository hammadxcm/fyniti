language: en
reviews:
  profile: chill
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "src/styles/**"
      instructions: "Focus on CSS specificity issues, missing responsive breakpoints, and theme consistency"
    - path: "src/scripts/**"
      instructions: "Check for memory leaks, proper cleanup, and accessibility (prefers-reduced-motion)"
    - path: "src/components/**"
      instructions: "Verify semantic HTML, accessibility (ARIA), and responsive design"
chat:
  auto_reply: true
