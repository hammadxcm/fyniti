name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Astro site
        run: pnpm build
        env:
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  lighthouse:
    name: Lighthouse Audit
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://fyniti.co.uk
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Generate badge data
        run: |
          PERF=$(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.performance * 100 | round')
          A11Y=$(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.accessibility * 100 | round')
          BP=$(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary."best-practices" * 100 | round')
          SEO=$(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.seo * 100 | round')

          color() { if [ "$1" -ge 90 ]; then echo "brightgreen"; elif [ "$1" -ge 50 ]; then echo "orange"; else echo "red"; fi; }

          mkdir -p .github/badges
          echo "{\"schemaVersion\":1,\"label\":\"Performance\",\"message\":\"${PERF}\",\"color\":\"$(color $PERF)\"}" > .github/badges/lighthouse-performance.json
          echo "{\"schemaVersion\":1,\"label\":\"Accessibility\",\"message\":\"${A11Y}\",\"color\":\"$(color $A11Y)\"}" > .github/badges/lighthouse-accessibility.json
          echo "{\"schemaVersion\":1,\"label\":\"Best Practices\",\"message\":\"${BP}\",\"color\":\"$(color $BP)\"}" > .github/badges/lighthouse-best-practices.json
          echo "{\"schemaVersion\":1,\"label\":\"SEO\",\"message\":\"${SEO}\",\"color\":\"$(color $SEO)\"}" > .github/badges/lighthouse-seo.json

          echo "### Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | Accessibility | Best Practices | SEO |" >> $GITHUB_STEP_SUMMARY
          echo "|:-----------:|:------------:|:--------------:|:---:|" >> $GITHUB_STEP_SUMMARY
          echo "| ${PERF} | ${A11Y} | ${BP} | ${SEO} |" >> $GITHUB_STEP_SUMMARY

      - name: Commit badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/
          git diff --cached --quiet || git commit -m "ci: update lighthouse badges [skip ci]"
          git push || true
