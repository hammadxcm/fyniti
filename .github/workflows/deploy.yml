name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Astro site
        run: pnpm build
        env:
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  lighthouse:
    name: Lighthouse Audit
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://fyniti.co.uk
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Update badges
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
        run: |
          PERF=$(echo "$MANIFEST" | jq '.[0].summary.performance * 100 | round')
          A11Y=$(echo "$MANIFEST" | jq '.[0].summary.accessibility * 100 | round')
          BP=$(echo "$MANIFEST" | jq '.[0].summary."best-practices" * 100 | round')
          SEO=$(echo "$MANIFEST" | jq '.[0].summary.seo * 100 | round')

          color() { if [ "$1" -ge 90 ]; then echo "brightgreen"; elif [ "$1" -ge 50 ]; then echo "orange"; else echo "red"; fi; }

          GIST_ID="03c7e6932b267109a1e1ab5664ca18f3"

          update_badge() {
            local file="$1" label="$2" score="$3"
            curl -s -X PATCH "https://api.github.com/gists/$GIST_ID" \
              -H "Authorization: token $GIST_TOKEN" \
              -d "{\"files\":{\"$file\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"$label\\\",\\\"message\\\":\\\"$score\\\",\\\"color\\\":\\\"$(color $score)\\\"}\"}}}" > /dev/null
          }

          update_badge "lighthouse-performance.json" "Performance" "$PERF"
          update_badge "lighthouse-accessibility.json" "Accessibility" "$A11Y"
          update_badge "lighthouse-best-practices.json" "Best Practices" "$BP"
          update_badge "lighthouse-seo.json" "SEO" "$SEO"

          echo "### Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | Accessibility | Best Practices | SEO |" >> $GITHUB_STEP_SUMMARY
          echo "|:-----------:|:------------:|:--------------:|:---:|" >> $GITHUB_STEP_SUMMARY
          echo "| $PERF | $A11Y | $BP | $SEO |" >> $GITHUB_STEP_SUMMARY
