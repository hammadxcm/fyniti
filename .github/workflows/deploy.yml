name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Astro site
        run: pnpm build
        env:
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  lighthouse:
    name: Lighthouse Audit
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://fyniti.co.uk
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Update Lighthouse badges
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 03c7e6932b267109a1e1ab5664ca18f3
          filename: lighthouse-performance.json
          label: Performance
          message: ${{ fromJSON(steps.lighthouse.outputs.manifest)[0].summary.performance >= 0.9 && '🟢' || fromJSON(steps.lighthouse.outputs.manifest)[0].summary.performance >= 0.5 && '🟠' || '🔴' }} ${{ format('{0}', fromJSON(steps.lighthouse.outputs.manifest)[0].summary.performance * 100) }}
          valColorRange: ${{ fromJSON(steps.lighthouse.outputs.manifest)[0].summary.performance }}
          maxColorRange: 1
          minColorRange: 0

      - name: Update Accessibility badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 03c7e6932b267109a1e1ab5664ca18f3
          filename: lighthouse-accessibility.json
          label: Accessibility
          message: ${{ format('{0}', fromJSON(steps.lighthouse.outputs.manifest)[0].summary.accessibility * 100) }}
          valColorRange: ${{ fromJSON(steps.lighthouse.outputs.manifest)[0].summary.accessibility }}
          maxColorRange: 1
          minColorRange: 0

      - name: Update Best Practices badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 03c7e6932b267109a1e1ab5664ca18f3
          filename: lighthouse-best-practices.json
          label: Best Practices
          message: ${{ format('{0}', fromJSON(steps.lighthouse.outputs.manifest)[0].summary.best-practices * 100) }}
          valColorRange: ${{ fromJSON(steps.lighthouse.outputs.manifest)[0].summary.best-practices }}
          maxColorRange: 1
          minColorRange: 0

      - name: Update SEO badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 03c7e6932b267109a1e1ab5664ca18f3
          filename: lighthouse-seo.json
          label: SEO
          message: ${{ format('{0}', fromJSON(steps.lighthouse.outputs.manifest)[0].summary.seo * 100) }}
          valColorRange: ${{ fromJSON(steps.lighthouse.outputs.manifest)[0].summary.seo }}
          maxColorRange: 1
          minColorRange: 0

      - name: Summary
        run: |
          echo "### 🏠 Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | $(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.performance * 100 | round') |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | $(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.accessibility * 100 | round') |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | $(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary."best-practices" * 100 | round') |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | $(echo '${{ steps.lighthouse.outputs.manifest }}' | jq '.[0].summary.seo * 100 | round') |" >> $GITHUB_STEP_SUMMARY
